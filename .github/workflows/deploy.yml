name: CI/CD Pipeline - SonarQube, Build, Push and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: SonarQube Code Quality Analysis
  # ─────────────────────────────────────────────
  sonarqube-analysis:
    name: SonarQube Code Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history needed for SonarQube blame data

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: |
          cd client
          npm ci

      - name: Run SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=vcube-python-app
            -Dsonar.projectName=Vcube Python Application
            -Dsonar.projectVersion=1.0
            -Dsonar.sources=.
            -Dsonar.inclusions=**/*.py,**/*.jsx,**/*.js
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/__pycache__/**,**/client/public/**
            -Dsonar.python.version=3.11

      - name: SonarQube Quality Gate Check
        uses: SonarSource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ─────────────────────────────────────────────
  # JOB 2: Build and Push Docker Image to Docker Hub
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: sonarqube-analysis  # Only runs if SonarQube analysis passes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            krishnamohan2004/python:latest
            krishnamohan2004/python:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # JOB 3: Deploy to Kubernetes Cluster
  # ─────────────────────────────────────────────
  deploy-to-kubernetes:
    name: Deploy to Kubernetes
    needs: build-and-push   # Only runs after Docker image is pushed
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Set up Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 --decode > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Apply Kubernetes Manifests
        run: |
          kubectl apply -f k8s/

      - name: Update Deployment Image
        run: |
          kubectl set image deployment/vcube-deployment vcube-app=krishnamohan2004/python:${{ github.sha }}

      - name: Rollout Restart Deployment
        run: |
          kubectl rollout restart deployment/vcube-deployment

      - name: Wait for Rollout to Complete
        run: |
          kubectl rollout status deployment/vcube-deployment --timeout=120s

      - name: Display Service External IP
        run: |
          kubectl get svc vcube-service
