apiVersion: v1
kind: Service
metadata:
  name: vcube-service
  labels:
    app: vcube
spec:
  type: LoadBalancer # Configures cloud load balancer. Change to NodePort or ClusterIP if behind an Ingress
  ports:
    - port: 80
      targetPort: 5000
      protocol: TCP
      name: http
  selector:
    app: vcube
