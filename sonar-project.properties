# ─────────────────────────────────────────────────────────────
# SonarQube Project Configuration for Vcube Python Application
# All scanner properties are defined here to avoid CLI arg issues
# ─────────────────────────────────────────────────────────────

# Project identification (no spaces allowed in projectKey)
sonar.projectKey=vcube-python-app
sonar.projectName=Vcube-Python-Application
sonar.projectVersion=1.0

# Source code directory
sonar.sources=.

# Include only relevant source files
sonar.inclusions=**/*.py,**/*.jsx,**/*.js,**/*.css,**/*.html

# Exclude node_modules, build outputs, caches, and binaries
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/__pycache__/**,\
  **/*.pyc,\
  **/client/public/**,\
  **/.git/**,\
  *.mp4,\
  *.pdf,\
  *.exe,\
  *.msi

# Source file encoding
sonar.sourceEncoding=UTF-8

# Python version for the Python plugin
sonar.python.version=3.11

# Links
sonar.links.homepage=https://github.com/Krishnamohan2004/python-application
sonar.links.scm=https://github.com/Krishnamohan2004/python-application
